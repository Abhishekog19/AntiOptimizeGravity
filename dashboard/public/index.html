<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quota Control — Antigravity Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="topbar">
    <div class="wordmark">
      <span class="wordmark-main">quota</span><span class="wordmark-accent">control</span>
    </div>
    <div class="topbar-meta">
      <span id="clock" class="mono"></span>
      <button id="refreshBtn" class="ghost-btn">Refresh</button>
    </div>
  </header>

  <main id="app">
    <section id="recommendation" class="recommendation" hidden>
      <div class="recommendation-label">Use next</div>
      <div class="recommendation-body">
        <div class="recommendation-name" id="recName">—</div>
        <div class="recommendation-why" id="recWhy">—</div>
      </div>
    </section>

    <section class="grid" id="grid"></section>

    <p id="emptyState" class="empty-state" hidden>
      No readings yet. Once the extension captures its first reading from an
      Antigravity window, accounts will appear here as orbit cards.
    </p>
  </main>

  <div id="detailOverlay" class="detail-overlay" hidden>
    <div class="detail-panel">
      <button id="closeDetail" class="ghost-btn close-btn">Close</button>
      <h2 id="detailTitle" class="detail-title">—</h2>
      <div class="detail-chart-wrap">
        <svg id="detailChart" viewBox="0 0 640 220" preserveAspectRatio="none"></svg>
      </div>
      <div class="detail-legend">
        <span><i class="dot dot-claude"></i>Claude / GPT — Weekly</span>
        <span><i class="dot dot-claude-fh"></i>Claude / GPT — Five Hour</span>
        <span><i class="dot dot-gemini"></i>Gemini — Weekly</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
